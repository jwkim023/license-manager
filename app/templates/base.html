<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>License Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://unpkg.com/htmx.org@1.9.10" defer></script>
  <style>
    body { background-color: #f8f9fa; }
    .navbar-brand { font-weight: 700; letter-spacing: .5px; }
    .table th { font-size: .85rem; text-transform: uppercase; color: #6c757d; }
    .badge { font-size: .78rem; }
    .expire-warn { color: #dc3545; font-weight: 600; }
  </style>
</head>
<body>
  <nav class="navbar navbar-dark bg-dark mb-4 shadow-sm">
    <div class="container">
      <a class="navbar-brand" href="/">⬡ License Manager</a>
    </div>
  </nav>

  <div class="container pb-5">
    {% block content %}{% endblock %}
  </div>

  <!-- 공용 모달 컨테이너 -->
  <div id="modal-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // HTMX가 모달 HTML을 주입하면 Bootstrap 모달을 열어준다
    document.body.addEventListener("htmx:afterSwap", function (e) {
      if (e.detail.target.id === "modal-container") {
        const el = document.getElementById("licenseModal");
        if (el) new bootstrap.Modal(el).show();
      }
    });

    // 서버에서 HX-Trigger: closeModal 헤더를 보내면 모달을 닫는다
    document.body.addEventListener("closeModal", function () {
      const el = document.getElementById("licenseModal");
      if (el) bootstrap.Modal.getInstance(el)?.hide();
    });
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
