회사에서 생성형ai 라이선스 계정정보를 정리해서 엑셀로 관리하고있는데 아래 개발요건으로 시스템화를 시킬려고해 
아래 요건들을 고려했을때 어떤식으로 프로젝트 구성 및 개발언어를 가져가는게 좋을까? 여러 사람이 쓰는 시스템이 아니라 python 베이스로 간단하게 만들까 검토중인데
요건1 : 라이선스 현황 CRUD 작업을 쉽게 웹으로 진행할 수있음 
요건2 : 애저 AD를 등록을 통해서 조직도 및 임직원 정보를 받아와서 조직 업데이트 관리 수행
요건3 : 브리티 API CALL을 통해서 사용자에게 계정 정보 확인 메세지를 보내는
요건4 : 라이선스 및 조직 변경 현황 히스토리를 쉽게 확인할수있음
요건5 : 라이선스 현황 테이블을 DB로 관리해서 SPOTFIRE 와같은 툴에서 직접 당겨올수있도록 시스템 구성

좋은 요건 정리입니다. Python 베이스로 충분히 가능하고, 소규모 관리 시스템으로는 오히려 적합한 선택이에요. 제 추천 구성을 말씀드릴게요.
추천 기술 스택
백엔드: FastAPI (Python)
Flask보다 FastAPI를 추천하는 이유는 몇 가지 있습니다. 자동 API 문서(Swagger UI)가 생성되어 Brity API 연동 디버깅이 편하고, 비동기 처리가 기본 지원되어 Azure AD 호출이나 Brity API Call 같은 외부 연동에 유리합니다. 타입 힌트 기반이라 유지보수할 때 코드 파악이 쉽고요.
프론트엔드: Jinja2 템플릿 + HTMX (또는 간단한 Vue.js)
별도 프론트엔드 프로젝트를 분리하지 않고, FastAPI에 Jinja2 템플릿을 붙이면 프로젝트가 하나로 유지됩니다. HTMX를 쓰면 JavaScript를 거의 안 쓰고도 동적인 CRUD UI를 만들 수 있어요. 만약 UI를 좀 더 인터랙티브하게 하고 싶으면 Vue.js를 CDN으로 붙이는 정도면 충분합니다.
DB: PostgreSQL
요건5에서 Spotfire 같은 BI 툴이 직접 DB에 붙어야 하므로 SQLite는 부적합합니다. PostgreSQL이 ODBC/JDBC 커넥터 지원이 확실하고, Spotfire에서 직접 연결해서 쿼리를 날릴 수 있어요. ORM은 SQLAlchemy를 쓰면 됩니다.
인증/조직 연동: msal (Microsoft Authentication Library for Python)
Azure AD 연동에 공식 라이브러리이고, Graph API를 통해 조직도와 임직원 정보를 가져올 수 있습니다.
프로젝트 구조 (모노레포)
license-manager/
├── app/
│   ├── main.py              # FastAPI 엔트리포인트
│   ├── config.py             # 환경변수, DB 접속정보
│   ├── models/               # SQLAlchemy 모델
│   │   ├── license.py        # 라이선스 테이블
│   │   ├── organization.py   # 조직/임직원 테이블
│   │   └── history.py        # 변경 히스토리 테이블
│   ├── routers/
│   │   ├── license.py        # 라이선스 CRUD API
│   │   ├── organization.py   # 조직 동기화 API
│   │   ├── notification.py   # Brity 메시지 발송 API
│   │   └── history.py        # 히스토리 조회 API
│   ├── services/
│   │   ├── azure_ad.py       # Azure AD Graph API 연동
│   │   ├── brity.py          # Brity API 연동
│   │   └── history.py        # 변경 이력 자동 기록 로직
│   ├── templates/            # Jinja2 HTML 템플릿
│   └── static/               # CSS, JS
├── alembic/                  # DB 마이그레이션
├── requirements.txt
├── .env
└── docker-compose.yml        # PostgreSQL + 앱 컨테이너